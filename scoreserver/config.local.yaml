server:
  port: 8080

db:
  path: ./dev.db

rate_limit:
  per_ip_per_minute: 300         # relaxed for local dev
  per_install_per_minute: 300

buckets:
  version: v1
  total_ink:
    - { min: 0,    max: 100,  label: "0–99" }
    - { min: 100,  max: 200,  label: "100–199" }
    - { min: 200,  max: 300,  label: "200–299" }
    - { min: 300,  max: 400,  label: "300–399" }
    - { min: 400,  max: 500,  label: "400–499" }
    - { min: 500,  max: 0,    label: "500+" }
  core_area:
    - { min: 0,    max: 100,  label: "0–99" }
    - { min: 100,  max: 200,  label: "100–199" }
    - { min: 200,  max: 400,  label: "200–399" }
    - { min: 400,  max: 800,  label: "400–799" }
    - { min: 800,  max: 0,    label: "800+" }
